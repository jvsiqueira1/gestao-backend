name: Build and push image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify redeploy
        env:
          COOLIFY_WEBHOOK_URL: ${{ vars.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK_URL" ]; then
            echo "::warning::COOLIFY_WEBHOOK_URL is empty. Configure it under Settings → Secrets and variables → Actions → Variables (Repository variables)."
            exit 0
          fi
          if [ -z "$COOLIFY_TOKEN" ]; then
            echo "::warning::COOLIFY_TOKEN is empty. Configure it under Settings → Secrets and variables → Actions → Secrets (Repository secrets)."
          fi

          # Mask the URL (it may contain a uuid query string) so it does not leak in logs
          echo "::add-mask::$COOLIFY_WEBHOOK_URL"

          echo "Calling Coolify deploy webhook..."
          http_code=$(curl -sS -o /tmp/coolify-response.txt -w "%{http_code}" \
            -X GET "$COOLIFY_WEBHOOK_URL" \
            -H "Authorization: Bearer $COOLIFY_TOKEN")

          echo "HTTP status: $http_code"
          echo "Response body:"
          cat /tmp/coolify-response.txt
          echo

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Coolify webhook returned HTTP $http_code"
            exit 1
          fi
